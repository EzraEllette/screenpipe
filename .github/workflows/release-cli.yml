# # Run for macOS
# act -W .github/workflows/release-cli.yml --container-architecture linux/amd64 -j build-macos -P macos-latest=-self-hosted

# act -W .github/workflows/release-cli.yml --container-architecture linux/amd64 -j build-linux -P ubuntu-latest=catthehacker/ubuntu:act-latest --secret GITHUB_TOKEN=$(cat .env | grep GITHUB_TOKEN | tail -n 1 | cut -d '=' -f 2)

name: Release CLI

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      smoke_only:
        description: "Windows launch-smoke run only: build the Windows CLI package and run the native + Intel SDE (non-AVX2) probes; skip macOS/Linux builds, EV signing, Sentry symbols, npm publish, and the GitHub release (publish-npm/release skip via their skipped needs)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  GIT_LFS_SKIP_SMUDGE: 1

jobs:
  check_commit:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          # Always release on tag push or manual trigger
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Manual trigger - will release"
            exit 0
          fi

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Tag push - will release"
            exit 0
          fi

          # For branch pushes, check commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          # Release CLI when app is released or explicitly requested
          # Match: "release-app", "release-cli", "Bump app to vX.Y.Z", "Bump CLI to vX.Y.Z"
          if echo "$COMMIT_MSG" | grep -qiE "(release-app|release-cli|Bump app to v|Bump CLI to v)"; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Commit message contains release trigger - will release"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No release trigger found - skipping"
          fi

  build-macos:
    needs: check_commit
    # smoke_only skipping this job also skips publish-npm/release downstream
    # (their `needs` include it and they have no `if: always()`).
    if: needs.check_commit.outputs.should_release == 'true' && !inputs.smoke_only
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          override: true
          cache: true
          target: ${{ matrix.target }}
          rustflags: ""

      # sccache disabled temporarily due to GitHub Actions cache outage
      # - name: Setup sccache
      #   uses: mozilla-actions/sccache-action@v0.0.7
      #   with:
      #     version: "v0.8.2"

      # - name: Configure sccache
      #   run: |
      #     echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
      #     echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/ffmpeg
            /usr/local/Cellar/pkg-config
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/release-cli.yml') }}
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Install dependencies
        run: |
          brew unlink pkg-config@0.29.2 || true
          brew install ffmpeg pkg-config
          brew link --overwrite pkg-config

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build with Metal feature
        run: |
          export PKG_CONFIG_PATH="/usr/local/opt/ffmpeg/lib/pkgconfig:$PKG_CONFIG_PATH"
          export PKG_CONFIG_ALLOW_CROSS=1
          export RUSTFLAGS="-C link-arg=-Wl,-rpath,@executable_path/../lib -C link-arg=-Wl,-rpath,@loader_path/../lib"
          # Fix i8mm build error - force M1 compatible architecture
          # -U__ARM_FEATURE_MATMUL_INT8 undefines i8mm macro
          # See: https://github.com/ggml-org/whisper.cpp/issues/3427
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            export CFLAGS="-mcpu=apple-m1 -U__ARM_FEATURE_MATMUL_INT8"
            export CXXFLAGS="-mcpu=apple-m1 -U__ARM_FEATURE_MATMUL_INT8"
            cargo build --release -p screenpipe-engine --bin screenpipe --features metal,parakeet-mlx,rfdetr-mlx,redact-onnx-coreml --target ${{ matrix.target }}
          else
            cargo build --release -p screenpipe-engine --bin screenpipe --features metal,redact-onnx-coreml --target ${{ matrix.target }}
          fi

      - name: Upload debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: mediar
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli debug-files upload --org $SENTRY_ORG --project screenpipe-cli target/${{ matrix.target }}/release/

      - name: Codesign binary
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # Import certificate into a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Sign the binary with hardened runtime
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            target/${{ matrix.target }}/release/screenpipe

          # Verify signature
          codesign --verify --verbose target/${{ matrix.target }}/release/screenpipe
          echo "codesign: verified"

      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # notarytool requires zip/dmg/pkg
          ditto -c -k --keepParent \
            target/${{ matrix.target }}/release/screenpipe \
            $RUNNER_TEMP/screenpipe-notarize.zip

          xcrun notarytool submit $RUNNER_TEMP/screenpipe-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m

          echo "notarization: complete"

      - name: Set version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            # Read version from workspace Cargo.toml
            VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          fi
          if [[ -z "$VERSION" ]]; then
            VERSION="0.0.0"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Set version to: $VERSION"

      - name: Create deployment package
        run: |
          mkdir -p screenpipe-${{ env.VERSION }}-${{ matrix.target }}/bin
          cp target/${{ matrix.target }}/release/screenpipe screenpipe-${{ env.VERSION }}-${{ matrix.target }}/bin/

          # Bundle mlx.metallib next to CLI binary (macOS aarch64 only)
          # MLX searches for mlx.metallib next to the binary at runtime.
          # CI cmake uses JIT mode so metallib isn't compiled — download pre-built from GitHub releases.
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            curl -L -f -o screenpipe-${{ env.VERSION }}-${{ matrix.target }}/bin/mlx.metallib \
              "https://github.com/screenpipe/screenpipe/releases/download/mlx-metallib-v0.2.0/mlx.metallib" \
              && echo "✅ Bundled mlx.metallib for CLI ($(du -h screenpipe-${{ env.VERSION }}-${{ matrix.target }}/bin/mlx.metallib | cut -f1))" \
              || echo "⚠️ Failed to download mlx.metallib"
          fi

          # Bundle the x86_64 ONNX Runtime dylib next to the CLI binary. Intel
          # mac uses load-dynamic (no rc.12 prebuilt); ort loads it from next to
          # the executable at runtime. Signed so the hardened-runtime binary can
          # load it (library validation). Homebrew bottle, immutable ghcr blob.
          if [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            ORT_BLOB="https://ghcr.io/v2/homebrew/core/onnxruntime/blobs/sha256:afe69511a14f1b9351074b0bf9e5de65858d25a6795ab7f228ba78b149079c3d"
            ORT_TMP="${RUNNER_TEMP:-/tmp}/ort-cli-$$"
            mkdir -p "$ORT_TMP"
            curl -fsSL -H "Authorization: Bearer QQ==" "$ORT_BLOB" -o "$ORT_TMP/bottle.tar.gz"
            tar -xzf "$ORT_TMP/bottle.tar.gz" -C "$ORT_TMP"
            ORT_DYLIB="$(find "$ORT_TMP" -name 'libonnxruntime*.dylib' | head -1)"
            cp "$ORT_DYLIB" screenpipe-${{ env.VERSION }}-${{ matrix.target }}/bin/libonnxruntime.dylib
            codesign --force --options runtime --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" --timestamp screenpipe-${{ env.VERSION }}-${{ matrix.target }}/bin/libonnxruntime.dylib
            rm -rf "$ORT_TMP"
            echo "✅ Bundled + signed libonnxruntime.dylib for Intel CLI"
          fi

          tar -czf screenpipe-${{ env.VERSION }}-${{ matrix.target }}.tar.gz -C screenpipe-${{ env.VERSION }}-${{ matrix.target }} .

      - name: Calculate SHA256
        run: |
          echo "MAC_SHA256_${{ matrix.target }}=$(shasum -a 256 screenpipe-*.tar.gz | cut -d ' ' -f 1)" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-macos-${{ matrix.target }}
          path: screenpipe-*.tar.gz

  build-windows:
    needs: check_commit
    if: needs.check_commit.outputs.should_release == 'true'
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          Invoke-WebRequest https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-gnu/rustup-init.exe -OutFile rustup-init.exe
          .\rustup-init.exe -y

      - name: Install 7zip
        shell: pwsh
        run: |
          $7zipUrl = "https://7-zip.org/a/7z2301-x64.exe"
          $7zipInstaller = "7z-installer.exe"
          Invoke-WebRequest -Uri $7zipUrl -OutFile $7zipInstaller
          Start-Process -FilePath .\$7zipInstaller -Args "/S" -Wait
          Remove-Item $7zipInstaller
          # Add 7zip to PATH and make it persistent for subsequent steps
          echo "C:\Program Files\7-Zip" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          # Verify installation
          & "C:\Program Files\7-Zip\7z.exe" i

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # sccache disabled temporarily due to GitHub Actions cache outage
      # - name: Setup sccache
      #   uses: mozilla-actions/sccache-action@v0.0.7
      #   with:
      #     version: "v0.8.2"

      # - name: Configure sccache
      #   shell: bash
      #   run: |
      #     echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
      #     echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Download ONNX Runtime
        shell: pwsh
        run: |
          # DirectML flavor of the OFFICIAL MS build: baseline SSE2 + MLAS runtime
          # CPUID dispatch (full AVX2 speed on modern CPUs, no crash on old ones),
          # DML EP for parakeet/PII. pyke's download-binaries static libs are
          # compiled /arch:AVX2 since Oct 2025 and caused 0xc000001d at launch on
          # pre-Haswell CPUs. Keep in sync with release-app.yml's x64 branch.
          $version = '1.24.2'
          $dmlVersion = '1.15.4'
          $extractDir = "apps/screenpipe-app-tauri/src-tauri/onnxruntime-win-x64-$version"
          if (Test-Path $extractDir) { Remove-Item $extractDir -Recurse -Force }
          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.ML.OnnxRuntime.DirectML/$version" -OutFile ort-dml.zip
          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.AI.DirectML/$dmlVersion" -OutFile directml.zip
          7z x ort-dml.zip -oort-dml -y
          7z x directml.zip -odirectml -y
          New-Item -ItemType Directory -Force -Path "$extractDir/lib" | Out-Null
          Copy-Item "ort-dml/runtimes/win-x64/native/onnxruntime.dll" "$extractDir/lib/"
          Copy-Item "ort-dml/runtimes/win-x64/native/onnxruntime.lib" "$extractDir/lib/"
          Copy-Item "directml/bin/x64-win/DirectML.dll" "$extractDir/lib/"
          # Import-table (load-time) link against the MS DLL — NOT ort's
          # `load-dynamic` feature (runtime LoadLibrary deadlocks with ort
          # rc.12, #4171/#4173). ORT_PREFER_DYNAMIC_LINK=1 makes ort-sys emit
          # a dynamic import instead of attempting a static link (which needs
          # onnxruntime_common.lib + the static _deps tree the MS prebuilt
          # doesn't ship).
          $libDir = (Resolve-Path "$extractDir/lib").Path
          "ORT_STRATEGY=system"        | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ORT_LIB_LOCATION=$libDir"   | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ORT_PREFER_DYNAMIC_LINK=1"  | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$libDir"                    | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          Write-Host "x64: ORT_LIB_LOCATION=$libDir (dynamic import link)"
          Get-ChildItem "$extractDir/lib"

      - name: Install wget (Windows)
        shell: pwsh
        run: |
          $wgetDir = "C:\wget"
          if (-not (Test-Path "$wgetDir\wget.exe")) {
            New-Item -ItemType Directory -Force -Path $wgetDir | Out-Null
            Invoke-WebRequest -Uri "https://eternallybored.org/misc/wget/1.21.3/64/wget.exe" -OutFile "$wgetDir\wget.exe"
          }
          $env:Path = "$wgetDir;$env:Path"
          echo "$wgetDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup OpenBLAS
        shell: pwsh
        run: |
          cd apps/screenpipe-app-tauri
          bun scripts/setup_openblas.js
          "OPENBLAS_PATH=${{ github.workspace }}/apps/screenpipe-app-tauri/src-tauri/openblas" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Shorten target dir to avoid MAX_PATH
        shell: pwsh
        run: |
          $targetDir = "target"
          $shortDir = "C:\t"
          if (Test-Path $shortDir) { Remove-Item -Recurse -Force $shortDir }
          New-Item -ItemType Directory -Force -Path $shortDir | Out-Null
          if (Test-Path $targetDir) { Remove-Item -Recurse -Force $targetDir }
          cmd /c mklink /J $targetDir $shortDir
          Write-Host "Created junction: $targetDir -> $shortDir"

      - name: Build CLI
        env:
          CARGO_PROFILE_RELEASE_STRIP: "none"
          CARGO_PROFILE_RELEASE_PANIC: "abort"
          CARGO_PROFILE_RELEASE_INCREMENTAL: "false"
          # LTCG removed: MSVC LTCG ignores /arch flags and can emit AVX-512 on Xeon CI runners
          # causing STATUS_ILLEGAL_INSTRUCTION on consumer CPUs (Arrow Lake, Panther Lake, Lunar Lake)
          RUSTFLAGS: ""
          # Do NOT set global CFLAGS/CXXFLAGS=/arch:AVX2. That made EVERY cc/cmake
          # C dep (bundled SQLite, sqlite-vec, lame, webrtc-vad, knf, samplerate,
          # antirez qwen3 kernels...) require AVX2 → 0xc000001d AT LAUNCH on
          # pre-Haswell/Atom CPUs. MSVC's x64 default is baseline SSE2. AVX2 is
          # opted into ONLY where there's a runtime guard: ggml below (whisper is
          # gated on is_x86_feature_detected in screenpipe-audio), and ONNX
          # Runtime does its own runtime CPUID dispatch (MS official DLL).
          CFLAGS: ""
          CXXFLAGS: ""
          # whisper-rs build.rs passes GGML_* env vars as cmake defines.
          # CMAKE_ARGS string was ignored — these individual vars actually work.
          # GGML_NATIVE=OFF prevents FindSIMD.cmake AVX-512 detection on CI Xeons.
          # AVX2/BMI2 pinned ON explicitly: whisper keeps full speed; the runtime
          # AVX2 gate in screenpipe-audio disables whisper instead of crashing.
          GGML_NATIVE: "OFF"
          GGML_SSE42: "ON"
          GGML_AVX: "ON"
          GGML_AVX2: "ON"
          GGML_BMI2: "ON"
          GGML_AVX512: "OFF"
          GGML_AVX512_VBMI: "OFF"
          GGML_AVX512_VNNI: "OFF"
          GGML_AVX512_BF16: "OFF"
          CMAKE_ARGS: "-DGGML_NATIVE=OFF -DGGML_AVX512=OFF -DGGML_AVX512_VBMI=OFF -DGGML_AVX512_VNNI=OFF -DGGML_AVX512_BF16=OFF"
          # ONNX Runtime links dynamically (import table) against the MS
          # DirectML-flavored onnxruntime.dll: the "Download ONNX Runtime" step
          # sets ORT_STRATEGY/ORT_LIB_LOCATION/ORT_PREFER_DYNAMIC_LINK via
          # $GITHUB_ENV. Same mechanism as release-app.yml — keep in sync.
          OPENBLAS_PATH: ${{ github.workspace }}/apps/screenpipe-app-tauri/src-tauri/openblas
          # Use prebuilt NASM objects on Windows: https://aws.github.io/aws-lc-rs/requirements/windows.html#prebuilt-nasm-objects
          AWS_LC_SYS_PREBUILT_NASM: "1"
        run: |
          cargo build --release -p screenpipe-engine --bin screenpipe --features directml,redact-onnx-directml --target x86_64-pc-windows-msvc

      - name: Upload debug symbols to Sentry
        # Skipped on smoke_only dispatches: nothing from those builds ships.
        if: ${{ !inputs.smoke_only }}
        shell: pwsh
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: mediar
        run: |
          Invoke-WebRequest -Uri "https://release-registry.services.sentry.io/apps/sentry-cli/latest?response=download&arch=x86_64&platform=Windows&package=sentry-cli" -OutFile sentry-cli.exe
          .\sentry-cli.exe debug-files upload --org $env:SENTRY_ORG --project screenpipe-cli target/x86_64-pc-windows-msvc/release/

      - name: Install CodeSignTool for SSL.com EV signing (Windows)
        # Skipped on smoke_only dispatches (only used by the signing step below).
        if: ${{ !inputs.smoke_only }}
        shell: pwsh
        run: |
          # Same SSL.com eSigner cert + tool the desktop app uses (release-app.yml).
          $cstDest = "$env:RUNNER_TEMP\CodeSignTool"
          Write-Host "Downloading CodeSignTool..."
          Invoke-WebRequest -Uri "https://github.com/SSLcom/CodeSignTool/releases/download/v1.3.2/CodeSignTool-v1.3.2-windows.zip" -OutFile "$env:RUNNER_TEMP\cst.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\cst.zip" -DestinationPath "$cstDest" -Force
          echo "CODESIGNTOOL_PATH=$cstDest" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "CodeSignTool installed at $cstDest"

      - name: Sign screenpipe.exe with SSL.com EV (Windows)
        # Skipped on smoke_only dispatches: each SSL.com sign consumes monthly
        # quota and nothing from those builds ships.
        if: ${{ !inputs.smoke_only }}
        shell: pwsh
        env:
          ESIGNER_USERNAME: ${{ secrets.ESIGNER_USERNAME }}
          ESIGNER_PASSWORD: ${{ secrets.ESIGNER_PASSWORD }}
          ESIGNER_TOTP_SECRET: ${{ secrets.ESIGNER_TOTP_SECRET }}
          ESIGNER_CREDENTIAL_ID: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
        run: |
          # Authenticode-sign our own binary so Windows/Defender stop flagging it
          # as "Unknown publisher". Only screenpipe.exe is signed here: the bundled
          # DLLs (onnxruntime, vcruntime/msvcp) are already vendor-signed, and each
          # SSL.com sign consumes monthly quota, so we sign exactly one PE per release.
          # sign-ssl.ps1 no-ops when ESIGNER_* secrets are absent (forks/PRs).
          $exe = (Resolve-Path "target/x86_64-pc-windows-msvc/release/screenpipe.exe").Path
          & apps/screenpipe-app-tauri/src-tauri/sign-ssl.ps1 $exe
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: signing failed for $exe"; exit 1 }
          if ($env:ESIGNER_USERNAME) {
            $sig = Get-AuthenticodeSignature $exe
            Write-Host "Authenticode status: $($sig.Status)"
            if ($sig.Status -ne 'Valid') {
              Write-Host "ERROR: screenpipe.exe not validly signed (status=$($sig.Status))"
              exit 1
            }
            Write-Host "Signed by: $($sig.SignerCertificate.Subject)"
          }

      - name: Set version
        shell: pwsh
        run: |
          $VERSION = if ($env:GITHUB_REF -match "refs/tags/*") {
              $env:GITHUB_REF -replace "refs/tags/v", ""
          } else {
              # Read version from workspace Cargo.toml
              $cargoContent = Get-Content "Cargo.toml" -Raw
              if ($cargoContent -match 'version = "([^"]+)"') {
                  $matches[1]
              } else {
                  "0.0.0"
              }
          }
          if ([string]::IsNullOrEmpty($VERSION)) {
              $VERSION = "0.0.0"
          }
          "VERSION=$VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append
          "Set version to: $VERSION"

      - name: Create deployment package
        shell: pwsh
        run: |
          $packageDir = "screenpipe-${{ env.VERSION }}-x86_64-pc-windows-msvc"
          New-Item -Path "$packageDir/bin" -ItemType Directory -Force
          Copy-Item "target/x86_64-pc-windows-msvc/release/screenpipe.exe" "$packageDir/bin/"
          # Copy onnxruntime.dll - try target dir first (ort copy-dylibs), fallback to ORT_LIB_LOCATION
          $ortDll = "target/x86_64-pc-windows-msvc/release/onnxruntime.dll"
          if (!(Test-Path $ortDll)) {
            $ortDll = "apps/screenpipe-app-tauri/src-tauri/onnxruntime-win-x64-1.24.2/lib/onnxruntime.dll"
          }
          Copy-Item $ortDll "$packageDir/bin/"
          # DirectML.dll: the DirectML-flavored onnxruntime.dll needs it for the
          # DML EP (staged by the "Download ONNX Runtime" step).
          Copy-Item "apps/screenpipe-app-tauri/src-tauri/onnxruntime-win-x64-1.24.2/lib/DirectML.dll" "$packageDir/bin/"
          # Copy OpenBLAS DLL(s) for qwen3-asr (libopenblas.dll or openblas.dll)
          $openblasBin = "apps/screenpipe-app-tauri/src-tauri/openblas/bin"
          if (Test-Path $openblasBin) {
            Copy-Item "$openblasBin/*.dll" "$packageDir/bin/" -Force
          }
          # Bundle VC++ runtime DLLs required by onnxruntime.dll (dynamic CRT).
          # These MUST ship: a missing one causes STATUS_DLL_INIT_FAILED
          # (0xC0000142) on customer machines without the VC++ redistributable.
          # Hard-fail rather than silently shipping an incomplete package
          # (these previously used -ErrorAction SilentlyContinue).
          # msvcp140_1.dll: load-time import of the MS DirectML-flavored
          # onnxruntime.dll (verified via its PE import table) — the previous
          # list predates the switch off pyke's static libs.
          $vcDlls = @('vcruntime140.dll', 'vcruntime140_1.dll', 'msvcp140.dll', 'msvcp140_1.dll')
          foreach ($dll in $vcDlls) {
            $src = "C:\Windows\System32\$dll"
            if (!(Test-Path $src)) {
              Write-Host "ERROR: required VC++ runtime DLL not found on runner: $src"
              exit 1
            }
            Copy-Item $src "$packageDir/bin/" -Force
          }
          foreach ($dll in $vcDlls) {
            if (!(Test-Path "$packageDir/bin/$dll")) {
              Write-Host "ERROR: $dll missing from package bin/ after copy"
              exit 1
            }
          }
          7z a "$packageDir.zip" "./$packageDir/*"

      - name: Launch smoke test (native CPU + emulated non-AVX2 via Intel SDE)
        shell: pwsh
        run: |
          # A --version probe exercises process init end-to-end: CRT startup,
          # the import table (onnxruntime.dll → MSVCP/VCRUNTIME), and every
          # static initializer. Run from the deployment package dir so DLL
          # resolution matches exactly what customers get.
          #
          # Native first: the runner's own modern (AVX2) CPU is what ~99.9% of
          # users run — a native failure means the package is broken for
          # EVERYONE (e.g. a DLL missing from the zip), independent of any
          # AVX2 work. Ordering it first makes failures unambiguous:
          # native fails = broken for all; native passes but SDE fails =
          # AVX2/baseline regression specifically.
          $packageDir = "screenpipe-${{ env.VERSION }}-x86_64-pc-windows-msvc"
          $exe = (Resolve-Path "$packageDir/bin/screenpipe.exe").Path
          Write-Host "=== native (runner CPU) — screenpipe.exe --version ==="
          & $exe --version
          if ($LASTEXITCODE -ne 0) { throw "screenpipe.exe failed natively (exit $LASTEXITCODE) — the package is broken for ALL CPUs" }

          # Intel SDE emulates older CPUs and raises the same illegal-instruction
          # fault a real pre-AVX2 chip would. -snb = Sandy Bridge (AVX, no AVX2);
          # -mrm = Merom (no AVX at all — harshest baseline case).
          # Guards against regressions of the 0xc000001d launch crash: global
          # /arch:AVX2 CFLAGS, AVX2 static onnxruntime, eager ggml init, etc.
          # CI runners have AVX2, so without SDE a poisoned build sails through
          # CI and dies on customer machines (see the 2026-07 pre-Haswell report).
          # SDE URL: pinned to 9.44.0 — the exact version + extraction recipe
          # proven on these runners in google/XNNPACK's CI. SDE 10.8's Pin
          # injector fails on windows-2022 runners with "Invalid file name and
          # base dir combination: pincrt4.dll / Injection failed (ffffffff)"
          # (run 28806190901) before the app under test even starts. Use plain
          # tar -xf (bsdtar handles .tar.xz natively on Win10+); the 7z
          # two-step extraction is another delta from the proven recipe.
          # If Intel rotates the mirror, grab a fresh URL from
          # https://www.intel.com/content/www/us/en/developer/articles/tool/software-development-emulator.html
          $sdeUrl = 'https://downloadmirror.intel.com/831748/sde-external-9.44.0-2024-08-22-win.tar.xz'
          curl.exe -fSL -o sde.tar.xz $sdeUrl
          tar -xf sde.tar.xz
          $sde = (Get-ChildItem "sde-external-*" -Recurse -Filter sde.exe | Select-Object -First 1).FullName
          if (-not $sde) { throw "sde.exe not found after extraction" }
          foreach ($cpu in @('-snb', '-mrm')) {
            Write-Host "=== SDE $cpu — screenpipe.exe --version ==="
            & $sde $cpu -- $exe --version
            if ($LASTEXITCODE -ne 0) { throw "screenpipe.exe faulted under SDE $cpu (exit $LASTEXITCODE) — a non-AVX2 CPU cannot launch this build" }
          }

      - name: Calculate SHA256
        shell: pwsh
        run: |
          $hash = Get-FileHash "screenpipe-${{ env.VERSION }}-x86_64-pc-windows-msvc.zip" -Algorithm SHA256
          "WIN_SHA256=$($hash.Hash)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-windows
          path: screenpipe-*.zip

  build-linux:
    needs: check_commit
    # See build-macos: skipped under smoke_only, which cascades to
    # publish-npm/release.
    if: needs.check_commit.outputs.should_release == 'true' && !inputs.smoke_only
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # sccache disabled temporarily due to GitHub Actions cache outage
      # - name: Setup sccache
      #   uses: mozilla-actions/sccache-action@v0.0.7
      #   with:
      #     version: "v0.8.2"

      # - name: Configure sccache
      #   run: |
      #     echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
      #     echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            ffmpeg \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libasound2-dev \
            libdbus-1-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libtesseract-dev \
            libssl-dev \
            cmake \
            build-essential \
            clang \
            libclang-dev \
            libx11-dev \
            libxi-dev \
            libxext-dev \
            libxtst-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxdo-dev \
            libwayland-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            libegl-dev \
            libopenblas-dev
          # antirez-asr-sys build script emits -llibopenblas (double lib prefix).
          # Create a symlink so the linker can find it.
          sudo mkdir -p /usr/lib/x86_64-linux-gnu/openblas/lib
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libopenblas.so /usr/lib/x86_64-linux-gnu/openblas/lib/liblibopenblas.so
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libopenblas.a /usr/lib/x86_64-linux-gnu/openblas/lib/liblibopenblas.a
          echo "OPENBLAS_PATH=/usr/lib/x86_64-linux-gnu/openblas" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: |
          cargo build --release -p screenpipe-engine --bin screenpipe --features redact-onnx-cpu --target ${{ matrix.target }}

      - name: Upload debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: mediar
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli debug-files upload --org $SENTRY_ORG --project screenpipe-cli target/${{ matrix.target }}/release/

      - name: Set version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            # Read version from workspace Cargo.toml
            VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          fi
          if [[ -z "$VERSION" ]]; then
            VERSION="0.0.0"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Set version to: $VERSION"

      - name: Create deployment package
        run: |
          mkdir -p screenpipe-${{ env.VERSION }}-${{ matrix.target }}/bin
          cp target/${{ matrix.target }}/release/screenpipe screenpipe-${{ env.VERSION }}-${{ matrix.target }}/bin/
          # Bundle a static tesseract + English language data next to the binary.
          # Unlike the .deb (which `depends` on tesseract-ocr), the npm CLI has no
          # package manager to provide tesseract, so OCR on a host without a system
          # install crashes (rusty-tesseract panics on the missing subprocess —
          # SCREENPIPE-CLI-V3/T0, "tesseract not found" CLI-4R). The engine prepends
          # bin/ to PATH and points TESSDATA_PREFIX at bin/tessdata at startup.
          # Static build + tessdata_fast (LSTM, matches the engine's oem=1) mirror
          # the AppImage bundle.
          PKG_BIN="screenpipe-${{ env.VERSION }}-${{ matrix.target }}/bin"
          for i in 1 2 3; do
            curl -fsSL https://github.com/DanielMYT/tesseract-static/releases/download/tesseract-5.5.0/tesseract -o "$PKG_BIN/tesseract" && break || sleep $((5 * i))
          done
          chmod +x "$PKG_BIN/tesseract"
          [ -s "$PKG_BIN/tesseract" ] || { echo "ERROR: bundled tesseract missing/empty"; exit 1; }
          mkdir -p "$PKG_BIN/tessdata"
          for i in 1 2 3; do
            curl -fsSL https://github.com/tesseract-ocr/tessdata_fast/raw/4.1.0/eng.traineddata -o "$PKG_BIN/tessdata/eng.traineddata" && break || sleep $((5 * i))
          done
          [ -s "$PKG_BIN/tessdata/eng.traineddata" ] || { echo "ERROR: bundled eng.traineddata missing/empty"; exit 1; }
          tar -czf screenpipe-${{ env.VERSION }}-${{ matrix.target }}.tar.gz -C screenpipe-${{ env.VERSION }}-${{ matrix.target }} .

      - name: Calculate SHA256
        run: |
          echo "LINUX_SHA256_${{ matrix.target }}=$(sha256sum screenpipe-*.tar.gz | cut -d ' ' -f 1)" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-linux-${{ matrix.target }}
          path: screenpipe-*.tar.gz

  publish-npm:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          fi
          if [[ -z "$VERSION" ]]; then
            VERSION="0.0.0"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare platform packages
        run: |
          # macOS ARM64
          mkdir -p /tmp/darwin-arm64
          mkdir -p packages/cli/screenpipe-darwin-arm64/bin
          tar -xzf artifacts/screenpipe-macos-aarch64-apple-darwin/screenpipe-*.tar.gz -C /tmp/darwin-arm64
          cp /tmp/darwin-arm64/bin/screenpipe packages/cli/screenpipe-darwin-arm64/bin/ 2>/dev/null || \
            (cd artifacts/screenpipe-macos-aarch64-apple-darwin && tar -xzf screenpipe-*.tar.gz && cp bin/screenpipe ../../packages/cli/screenpipe-darwin-arm64/bin/)
          # Bundle mlx.metallib for Parakeet MLX GPU support
          cp /tmp/darwin-arm64/bin/mlx.metallib packages/cli/screenpipe-darwin-arm64/bin/ 2>/dev/null || \
            (cd artifacts/screenpipe-macos-aarch64-apple-darwin && cp bin/mlx.metallib ../../packages/cli/screenpipe-darwin-arm64/bin/ 2>/dev/null) || \
            echo "⚠️ mlx.metallib not found in artifact"
          chmod +x packages/cli/screenpipe-darwin-arm64/bin/screenpipe
          test -f packages/cli/screenpipe-darwin-arm64/bin/screenpipe

          # macOS x64
          mkdir -p packages/cli/screenpipe-darwin-x64/bin
          cd artifacts/screenpipe-macos-x86_64-apple-darwin && tar -xzf screenpipe-*.tar.gz && cp bin/screenpipe ../../packages/cli/screenpipe-darwin-x64/bin/ && (cp bin/libonnxruntime.dylib ../../packages/cli/screenpipe-darwin-x64/bin/ 2>/dev/null || true) && cd ../..
          chmod +x packages/cli/screenpipe-darwin-x64/bin/screenpipe

          # Linux x64
          mkdir -p packages/cli/screenpipe-linux-x64/bin
          cd artifacts/screenpipe-linux-x86_64-unknown-linux-gnu && tar -xzf screenpipe-*.tar.gz && cp bin/screenpipe ../../packages/cli/screenpipe-linux-x64/bin/ && cd ../..
          chmod +x packages/cli/screenpipe-linux-x64/bin/screenpipe
          test -f packages/cli/screenpipe-linux-x64/bin/screenpipe

          # Windows x64
          mkdir -p packages/cli/screenpipe-win32-x64/bin
          cd artifacts/screenpipe-windows && unzip -o screenpipe-*.zip -d extracted && cp extracted/bin/screenpipe.exe ../../packages/cli/screenpipe-win32-x64/bin/ && cp extracted/bin/*.dll ../../packages/cli/screenpipe-win32-x64/bin/ 2>/dev/null || true && cd ../..

      - name: Update package versions
        run: |
          for pkg in screenpipe screenpipe-darwin-arm64 screenpipe-darwin-x64 screenpipe-linux-x64 screenpipe-win32-x64; do
            cp LICENSE.md packages/cli/$pkg/LICENSE.md
            cd packages/cli/$pkg
            npm version ${{ env.VERSION }} --no-git-tag-version --allow-same-version 2>/dev/null || true
            cd ../../..
          done
          # Update optionalDependencies versions in main package
          cd packages/cli/screenpipe
          node -e "
            const pkg = require('./package.json');
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '${{ env.VERSION }}';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cd ../../..

      # Publish helper: only swallow the *specific* "version already exists"
      # error from npm. Anything else (auth failure, network, validation) must
      # surface so the workflow fails loudly instead of silently shipping nothing.
      # Previously this step used `2>/dev/null || echo "skipping"` which masked
      # every error — versions 0.3.290..0.3.295 all "succeeded" without ever
      # publishing because the npm token had expired and nobody noticed.
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in screenpipe-darwin-arm64 screenpipe-darwin-x64 screenpipe-linux-x64 screenpipe-win32-x64; do
            cd packages/cli/$pkg
            err=$(mktemp)
            if npm publish --access public 2>"$err"; then
              echo "::notice::published $pkg"
            else
              if grep -q "You cannot publish over the previously published versions" "$err"; then
                echo "::warning::$pkg already at this version, skipping"
              else
                cat "$err" >&2
                exit 1
              fi
            fi
            cd ../../..
          done

      - name: Verify platform package tarballs
        run: |
          for pkg in \
            @screenpipe/cli-darwin-arm64 \
            @screenpipe/cli-darwin-x64 \
            @screenpipe/cli-linux-x64 \
            @screenpipe/cli-win32-x64; do
            ok=false
            for attempt in $(seq 1 30); do
              url=$(npm view "$pkg@${{ env.VERSION }}" dist.tarball 2>/dev/null || true)
              if [[ -z "$url" ]]; then
                echo "::warning::$pkg@${{ env.VERSION }} metadata is not visible yet (attempt $attempt/30)"
                sleep 10
                continue
              fi

              status=$(curl -sS -o /dev/null -w "%{http_code}" -L -I "$url" || true)
              if [[ "$status" == "200" ]]; then
                echo "::notice::$pkg@${{ env.VERSION }} tarball is fetchable"
                ok=true
                break
              fi

              echo "::warning::$pkg@${{ env.VERSION }} tarball returned HTTP $status (attempt $attempt/30)"
              sleep 10
            done

            if [[ "$ok" != "true" ]]; then
              echo "::error::$pkg@${{ env.VERSION }} tarball did not become fetchable"
              exit 1
            fi
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/cli/screenpipe
          err=$(mktemp)
          if npm publish --access public 2>"$err"; then
            echo "::notice::published main package"
          else
            if grep -q "You cannot publish over the previously published versions" "$err"; then
              echo "::warning::main package already at this version, skipping"
            else
              cat "$err" >&2
              exit 1
            fi
          fi

  release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            # Use tag version if triggered by tag
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            # Read version from workspace Cargo.toml
            VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          fi
          if [[ -z "$VERSION" ]]; then
            VERSION="0.0.0"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Set version to: $VERSION"

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Update the rolling "latest-cli" release instead of creating one per version
          # This avoids flooding the releases page
          gh release delete cli-latest --yes 2>/dev/null || true
          gh release create cli-latest --title "CLI v${{ env.VERSION }}" --notes "Latest CLI build: v${{ env.VERSION }}" --prerelease || true
          for file in artifacts/screenpipe-macos-*/screenpipe-*.tar.gz; do
            if [ -f "$file" ]; then
              gh release upload cli-latest "$file" --clobber
            else
              echo "Warning: $file not found"
            fi
          done
          for file in artifacts/screenpipe-windows/screenpipe-*.zip; do
            if [ -f "$file" ]; then
              gh release upload cli-latest "$file" --clobber
            else
              echo "Warning: $file not found"
            fi
          done
          for file in artifacts/screenpipe-linux-*/screenpipe-*.tar.gz; do
            if [ -f "$file" ]; then
              gh release upload cli-latest "$file" --clobber
            else
              echo "Warning: $file not found"
            fi
          done
